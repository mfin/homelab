---
apiVersion: v1
kind: Pod
metadata:
  name: "${POD}"
  namespace: "${NAMESPACE}"
spec:
  volumes:
    - name: data
      nfs:
        server: ${NFS_SERVER}
        path: ${NFS_PATH}
  containers:
    - name: debian
      image: debian:latest
      command: [ "/bin/bash", "-c", "--" ]
      args: [ "while true; do sleep 30; done;" ]
      volumeMounts:
        - mountPath: "/data"
          name: data
