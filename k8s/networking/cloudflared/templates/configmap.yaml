apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
data:
  config.yaml: |-
    tunnel: "{{ .Values.cloudflared.tunnelId }}"
    credentials-file: /etc/cloudflared/creds.json
    metrics: "0.0.0.0:8080"
    no-autoupdate: true
    originRequest:
      connectTimeout: 30s

    ingress:
    {{ range $route := .Values.homelab.routes }}
      - hostname: {{ $route | quote }}
        service: "https://envoy-external.envoy-gateway.svc.cluster.local"
        originRequest:
          originServerName: ext.mfin.app
    {{ end }}
      - hostname: "*.{{ .Values.homelab.domain }}"
        service: "https://nginx-external-controller.nginx-external.svc.cluster.local"
        originRequest:
          originServerName: {{ .Values.homelab.cname }}
      - hostname: "{{ .Values.media.domain }}"
        service: "https://envoy-media.envoy-gateway.svc.cluster.local"
        originRequest:
          originServerName: {{ .Values.media.cname }}
      - hostname: "*.{{ .Values.media.domain }}"
        service: "https://envoy-media.envoy-gateway.svc.cluster.local"
        originRequest:
          originServerName: {{ .Values.media.cname }}
      - service: http_status:404
