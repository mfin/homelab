app-template:
  controllers:
    main:
      replicas: 1
      type: statefulset
      containers:
        main:
          image:
            repository: ghcr.io/home-operations/radarr
            tag: 6.1.2@sha256:9967e56263a3c67eeaede5824103ee4c1c1f1511abd5965ac1e294bfd9b76dbb
          env:
            TZ: Europe/Ljubljana
            RADARR__APP__INSTANCENAME: Radarr
            RADARR__AUTH__METHOD: External
            RADARR__AUTH__REQUIRED: DisabledForLocalAddresses
            RADARR__SERVER__PORT: &port 80
            RADARR__LOG__LEVEL: info
          envFrom:
            - secretRef:
                name: radarr-secret
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              memory: 750Mi
      pod:
        annotations:
          reloader.stakater.com/auto: "true"
        securityContext:
          runAsUser: 1028
          runAsGroup: 100
          fsGroup: 100
          fsGroupChangePolicy: "OnRootMismatch"
  service:
    main:
      ports:
        http:
          port: *port
  route:
    main:
      hostnames:
        - radarr.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    config:
      enabled: true
      existingClaim: radarr
    data:
      enabled: true
      type: nfs
      server: synology.mfin.internal
      path: /volume1/data
      globalMounts:
        - path: /data
