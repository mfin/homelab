app-template:
  controllers:
    main:
      replicas: 1
      type: statefulset
      containers:
        main:
          image:
            repository: krateng/maloja
            tag: 3.2.4
          env:
            TZ: Europe/Ljubljana
            MALOJA_DATA_DIRECTORY: /data
          envFrom:
            - secretRef:
                name: maloja-secret
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              memory: 1000Mi
      pod:
        annotations:
          reloader.stakater.com/auto: "true"
  service:
    main:
      ports:
        http:
          port: 42010
  route:
    main:
      hostnames:
        - maloja.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    config:
      enabled: true
      existingClaim: maloja
