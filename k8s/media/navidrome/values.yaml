app-template:
  controllers:
    main:
      replicas: 1
      type: statefulset
      containers:
        main:
          image:
            repository: ghcr.io/navidrome/navidrome
            tag: 0.60.3
          env:
            TZ: Europe/Ljubljana
            ND_ENABLEINSIGHTSCOLLECTOR: "false"
            ND_DATAFOLDER: /config
            ND_ENABLEDOWNLOADS: "true"
            ND_ENABLESHARING: "false"
            ND_LOGLEVEL: info
            ND_MUSICFOLDER: /data/music
            ND_PORT: &port 4533
            ND_SCANSCHEDULE: 30m
            ND_BASEURL: https://music.mfin.app
            ND_LISTENBRAINZ_BASEURL: "http://multi-scrobbler.multi-scrobbler:9078/1"
            ND_LISTENBRAINZ_ENABLED: "true"
          probes:
            liveness:
              enabled: true
            readiness:
              enabled: true
            startup:
              enabled: true
              spec:
                failureThreshold: 30
                periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              memory: 1000Mi
      pod:
        annotations:
          reloader.stakater.com/auto: "true"
        securityContext:
          runAsUser: 1028
          runAsGroup: 100
          fsGroup: 100
          fsGroupChangePolicy: "OnRootMismatch"
  service:
    main:
      ports:
        http:
          port: *port
  route:
    main:
      hostnames:
        - music.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    config:
      enabled: true
      existingClaim: navidrome
    data:
      enabled: true
      type: nfs
      server: synology.mfin.internal
      path: /volume1/data
      globalMounts:
        - path: /data
