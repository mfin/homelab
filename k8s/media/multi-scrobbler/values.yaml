app-template:
  controllers:
    main:
      replicas: 1
      type: statefulset
      containers:
        main:
          image:
            repository: ghcr.io/foxxmd/multi-scrobbler
            tag: 0.11.5
          env:
            TZ: Europe/Ljubljana
            BASE_URL: https://multi-scrobbler.mfin.app
            SUBSONIC_URL: http://navidrome.navidrome:4533
            MALOJA_URL: http://maloja.maloja:42010
            LASTFM_REDIRECT_URI: https://multi-scrobbler.mfin.app/lastfm/callback
          envFrom:
            - secretRef:
                name: multi-scrobbler-secret
          probes:
            liveness:
              enabled: true
            readiness:
              enabled: true
            startup:
              enabled: true
              spec:
                failureThreshold: 30
                periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              memory: 1000Mi
      pod:
        annotations:
          reloader.stakater.com/auto: "true"
        securityContext:
          runAsUser: 1028
          runAsGroup: 100
          fsGroup: 100
          fsGroupChangePolicy: "OnRootMismatch"
  service:
    main:
      ports:
        http:
          port: 9078
  route:
    main:
      hostnames:
        - multi-scrobbler.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    config:
      enabled: true
      existingClaim: multi-scrobbler
