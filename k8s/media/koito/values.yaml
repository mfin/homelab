app-template:
  controllers:
    main:
      replicas: 1
      type: statefulset
      containers:
        main:
          image:
            repository: gabehf/koito
            tag: v0.1.7
          env:
            TZ: Europe/Ljubljana
            KOITO_ALLOWED_HOSTS: "*"
            KOITO_DEFAULT_USERNAME: mfin
            KOITO_CONFIG_DIR: /config
          envFrom:
            - secretRef:
                name: koito-secret
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              memory: 1000Mi
      pod:
        annotations:
          reloader.stakater.com/auto: "true"
  service:
    main:
      ports:
        http:
          port: 4110
  route:
    main:
      hostnames:
        - koito.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    config:
      enabled: true
      existingClaim: koito
