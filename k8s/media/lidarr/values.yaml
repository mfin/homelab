app-template:
  controllers:
    main:
      replicas: 1
      type: statefulset
      containers:
        main:
          image:
            repository: ghcr.io/home-operations/lidarr
            tag: 3.1.3@sha256:b1e206e02bcacf1b540a813be74afb4f788114bbb540830478e5eb0e469c2162
          env:
            TZ: Europe/Ljubljana
            LIDARR__APP__INSTANCENAME: Lidarr
            LIDARR__AUTH__METHOD: External
            LIDARR__AUTH__REQUIRED: DisabledForLocalAddresses
            LIDARR__SERVER__PORT: &port 80
            LIDARR__LOG__LEVEL: info
          envFrom:
            - secretRef:
                name: lidarr-secret
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              memory: 1000Mi
      pod:
        annotations:
          reloader.stakater.com/auto: "true"
        securityContext:
          runAsUser: 1028
          runAsGroup: 100
          fsGroup: 100
          fsGroupChangePolicy: "OnRootMismatch"
  service:
    main:
      ports:
        http:
          port: *port
  route:
    main:
      hostnames:
        - lidarr.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    config:
      enabled: true
      existingClaim: lidarr
    data:
      enabled: true
      server: synology.mfin.internal
      type: nfs
      path: /volume1/data
      globalMounts:
        - path: /data
