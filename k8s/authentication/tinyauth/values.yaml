app-template:
  controllers:
    main:
      annotations:
        reloader.stakater.com/auto: "true"
      type: statefulset
      containers:
        main:
          image:
            repository: ghcr.io/steveiliop56/tinyauth
            tag: v5.0.4@sha256:d5035210ee238ca23f438f3715bcfec9b8135475316d2507a9df3ffc191aa173
          env:
            TZ: Europe/Ljubljana
            TINYAUTH_OAUTH_PROVIDERS_POCKETID_CLIENTID: tinyauth
            TINYAUTH_OAUTH_PROVIDERS_POCKETID_SCOPES: openid email profile groups
            TINYAUTH_OAUTH_PROVIDERS_POCKETID_NAME: Pocket ID
            TINYAUTH_OAUTH_AUTOREDIRECT: "pocketid"
            TINYAUTH_APPURL: "https://auth.mfin.app"
            TINYAUTH_OAUTH_PROVIDERS_POCKETID_AUTHURL: "https://pocket.mfin.app/authorize"
            TINYAUTH_OAUTH_PROVIDERS_POCKETID_TOKENURL: "https://pocket.mfin.app/api/oidc/token"
            TINYAUTH_OAUTH_PROVIDERS_POCKETID_USERINFOURL: "https://pocket.mfin.app/api/oidc/userinfo"
            TINYAUTH_OAUTH_PROVIDERS_POCKETID_REDIRECTURL: "https://auth.mfin.app/api/oauth/callback/pocketid"
          envFrom:
            - secretRef:
                name: tinyauth-secret
      pod:
        securityContext:
          runAsUser: 1028
          runAsGroup: 100
          fsGroup: 100
          fsGroupChangePolicy: "OnRootMismatch"
  service:
    main:
      controller: main
      ports:
        http:
          port: 3000
  route:
    main:
      hostnames:
        - auth.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    data:
      enabled: true
      existingClaim: tinyauth
