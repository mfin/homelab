app-template:
  controllers:
    main:
      annotations:
        reloader.stakater.com/auto: "true"
      type: statefulset
      containers:
        main:
          image:
            repository: ghcr.io/pocket-id/pocket-id
            tag: v2.3.0@sha256:3e3714a7efe20ade573c77844955ce3d096455f8b1f888068ec32a874792f781
          env:
            TZ: Europe/Ljubljana
            TRUST_PROXY: "true"
            MAXMIND_LICENSE_KEY: ""
            PUID: "1028"
            PGID: "100"
            APP_URL: "https://pocket.mfin.app"
          envFrom:
            - secretRef:
                name: pocket-id-secret
      pod:
        securityContext:
          runAsUser: 1028
          runAsGroup: 100
          fsGroup: 100
          fsGroupChangePolicy: "OnRootMismatch"
  service:
    main:
      controller: main
      ports:
        http:
          port: 1411
  route:
    main:
      hostnames:
        - pocket.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    data:
      enabled: true
      existingClaim: pocket-id
      globalMounts:
        - path: /app/data
