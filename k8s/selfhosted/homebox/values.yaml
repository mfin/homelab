app-template:
  controllers:
    main:
      annotations:
        reloader.stakater.com/auto: "true"
      type: statefulset
      replicas: 1
      containers:
        main:
          image:
            repository: ghcr.io/sysadminsmedia/homebox
            tag: 0.23.0@sha256:eabc0de4dbbcfb59289397d88ad80f768abf2e08c03f8c197be35ba953a10826
          env:
            TZ: Europe/Ljubljana
            HBOX_LOG_LEVEL: info
            HBOX_LOG_FORMAT: text
            HBOX_MEB_MAX_UPLOAD_SIZE: 10
            HBOX_WEB_PORT: &port 8080
            HBOX_OPTIONS_ALLOW_REGISTRATION: "false"
          resources:
            requests:
              cpu: 23m
              memory: 2975M
            limits:
              memory: 6572M
      pod:
        securityContext:
          fsGroup: 100
          fsGroupChangePolicy: "OnRootMismatch"
  service:
    main:
      ports:
        http:
          port: *port
  ingress:
    main:
      enabled: true
      className: internal
  persistence:
    data:
      enabled: true
      existingClaim: homebox
      globalMounts:
        - path: /data
