app-template:
  controllers:
    main:
      annotations:
        reloader.stakater.com/auto: "true"
      type: statefulset
      replicas: 1
      containers:
        main:
          image:
            repository: ghcr.io/sysadminsmedia/homebox
            tag: 0.24.1@sha256:d33fddca663aeb0a6c2f45cda35d1db639b8b39998ef387c007b2ee421972ffe
          env:
            TZ: Europe/Ljubljana
            HBOX_LOG_LEVEL: info
            HBOX_LOG_FORMAT: text
            HBOX_WEB_MAX_UPLOAD_SIZE: 10
            HBOX_WEB_PORT: &port 8080
            HBOX_OPTIONS_ALLOW_REGISTRATION: "false"
            HBOX_OIDC_ENABLED: "true"
            HBOX_OIDC_ISSUER_URL: https://pocket.mfin.app
            HBOX_OIDC_CLIENT_ID: homebox
            HBOX_OPTIONS_TRUST_PROXY: "true"
            HBOX_OPTIONS_ALLOW_LOCAL_LOGIN: "false"
            HBOX_OIDC_VERIFY_EMAIL: "true"
          envFrom:
            - secretRef:
                name: homebox-secret
          resources:
            requests:
              cpu: 23m
              memory: 2975M
            limits:
              memory: 6572M
      pod:
        securityContext:
          fsGroup: 100
          fsGroupChangePolicy: "OnRootMismatch"
  service:
    main:
      ports:
        http:
          port: *port
  route:
    main:
      hostnames:
        - inventory.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    data:
      enabled: true
      existingClaim: homebox
      globalMounts:
        - path: /data
