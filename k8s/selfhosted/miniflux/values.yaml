app-template:
  controllers:
    main:
      replicas: 1
      strategy: RollingUpdate
      annotations:
        reloader.stakater.com/auto: "true"
      initContainers:
        01-init-db:
          image:
            repository: ghcr.io/home-operations/postgres-init
            tag: 18.4@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
          envFrom:
            - secretRef:
                name: postgres
      containers:
        main:
          image:
            repository: ghcr.io/miniflux/miniflux
            tag: 2.2.19
          env:
            CREATE_ADMIN: "1"
            # DEBUG: "1"
            LOG_DATE_TIME: "1"
            # OAUTH2_CLIENT_ID: miniflux
            # OAUTH2_USER_CREATION: "1"
            # OAUTH2_PROVIDER: oidc
            POLLING_SCHEDULER: round_robin
            POLLING_FREQUENCY: "15"
            RUN_MIGRATIONS: "1"
          envFrom:
            - secretRef:
                name: miniflux
          probes:
            liveness: &probes
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthcheck
                  port: &port 8080
                initialDelaySeconds: 0
                periodSeconds: 10
                timeoutSeconds: 1
                failureThreshold: 3
            readiness: *probes
            startup:
              enabled: false
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 750Mi
  service:
    main:
      ports:
        http:
          port: *port
  serviceMonitor:
    main:
      enabled: false
  route:
    main:
      annotations:
        external.mfin.app/managed: "true"
      hostnames:
        - rss.mfin.app
      parentRefs:
        - name: envoy-external
          namespace: envoy-gateway
