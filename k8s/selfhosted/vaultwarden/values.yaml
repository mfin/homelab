app-template:
  controllers:
    main:
      annotations:
        reloader.stakater.com/auto: "true"
      type: statefulset
      replicas: 1
      containers:
        main:
          image:
            repository: ghcr.io/dani-garcia/vaultwarden
            tag: 1.35.7@sha256:9a8eec71f4a52411cc43edc7a50f33e9b6f62b5baca0dd95f0c6e7fd60f1a341
          env:
            DOMAIN: https://vault.mfin.app
            TZ: Europe/Ljubljana
            SIGNUPS_ALLOWED: false
            WEBSOCKET_ENABLED: true
          envFrom:
            - secretRef:
                name: vaultwarden-secret
      pod:
        securityContext:
          fsGroup: 100
          fsGroupChangePolicy: "OnRootMismatch"
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            memory: 500Mi
  service:
    main:
      ports:
        http:
          port: 80
  route:
    main:
      annotations:
        external.mfin.app/managed: "true"
      hostnames:
        - vault.mfin.app
      parentRefs:
        - name: envoy-external
          namespace: envoy-gateway
  persistence:
    data:
      enabled: true
      existingClaim: vaultwarden
