apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    external.mfin.app/managed: "true"
  name: argocd-server-webhook
spec:
  hostnames:
    - argocd-webhook.mfin.app
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-external
      namespace: envoy-gateway
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Service
          name: argocd-server
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /api/webhook
