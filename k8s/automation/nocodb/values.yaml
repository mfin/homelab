app-template:
  controllers:
    main:
      type: statefulset
      replicas: 1
      annotations:
        reloader.stakater.com/auto: "true"
      initContainers:
        01-init-db:
          image:
            repository: ghcr.io/home-operations/postgres-init
            tag: 18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
          envFrom:
            - secretRef:
                name: postgres
      containers:
        main:
          image:
            repository: nocodb/nocodb
            tag: 0.301.3
          envFrom:
            - secretRef:
                name: nocodb
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 750Mi
  service:
    main:
      ports:
        http:
          port: 80
  route:
    main:
      hostnames:
        - nocodb.mfin.app
      parentRefs:
        - name: envoy-internal
          namespace: envoy-gateway
  persistence:
    data:
      enabled: true
      existingClaim: nocodb
      globalMounts:
        - path: /usr/app/data
